<!DOCTYPE html>
<html>
<head>
  <title>Nigeria Emergency Map</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([9.0820, 8.6753], 6);

// 地图底图
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);
   
// 加载事件数据
fetch("data/events.json")
  .then(res => res.json())
  .then(data => {
    data.forEach(e => {
      L.circleMarker([e.lat, e.lng], {
        color: getColor(e.level)
      })
      .addTo(map)
      .bindPopup(`
        <b>${e.title}</b><br>
        Level: ${e.level}<br>
        <a href=" " target="_blank">Source</a >
      `);
    });
  });

function getColor(level) {
  if (level >= 5) return "red";
  if (level >= 4) return "orange";
  if (level >= 3) return "yellow";
  return "green";
}

                fillColor: color,
                fillOpacity: 0.7,
                radius: 10
                }).addTo(map);

      marker.bindPopup(`
        <b>${e.title}</b><br/>
        Location: ${e.location}<br/>
        Time: ${e.time}
      `).openPopup();
    });
  });
}

loadEvents();

// 每60秒刷新（模拟实时🔥）
setInterval(() => {
  location.reload();
}, 60000);
</script>

</body>
</html>
