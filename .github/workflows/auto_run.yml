name: 自动更新安全地图数据

on:
  schedule:
    # 每天的国际标准时间 00:00, 06:00, 12:00, 18:00 自动执行一次（每半小时更新）
    - cron: '*/30 * * * *'
  workflow_dispatch: # 允许我们在网页上随时手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查仓库代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装爬虫依赖组件
      run: |
        pip install requests

    - name: 执行 Python 爬虫脚本
      run: python fetch_news.py

    - name: 自动将最新数据提交并覆盖到仓库
      run: |
        git config --global user.name "Security Bot"
        git config --global user.email "bot@security.map"
        git add data.json
        git commit -m "自动更新安全数据: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
