name: Nigeria Security Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   # ✅ 修复点1

      - name: Setup Python
        uses: actions/setup-python@v4  # ✅ 建议加上
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install feedparser

      - name: Fetch News
        run: |
          python <<EOF
          import feedparser, json

          feed = feedparser.parse("https://news.google.com/rss/search?q=Nigeria+security&hl=en&gl=NG&ceid=NG:en")

          events = []
          for e in feed.entries[:5]:
              events.append({
                  "title": e.title,
                  "time": e.get("published", "unknown"),
                  "lat": 9.0820,
                  "lng": 8.6753,
                  "level": "medium"
              })

          with open("events.json", "w") as f:
              json.dump(events, f)

          print("done")
          EOF

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@email.com"
          git add .
          git diff --cached --quiet || git commit -m "update"
          git push
