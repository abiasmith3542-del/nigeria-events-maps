name: Update Nigeria Events

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Data
        run: |
          echo '[{"title":"Auto Event Lagos","location":"Lagos","lat":6.5,"lng":3.3,"level":"high","time":"auto"}]' > events.json

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add events.json
          git commit -m "update" || echo "no change"
          git push
